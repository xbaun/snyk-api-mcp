name: Publish package to GitHub Packages

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Optional package version override (for example 0.2.1)
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@${{ github.repository_owner }}'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm run build

      - name: Prepare package metadata for GitHub Packages
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          node --input-type=module <<'EOF'
          import fs from 'node:fs';

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const owner = (process.env.REPOSITORY_OWNER ?? '').trim().toLowerCase();
          const releaseTag = (process.env.RELEASE_TAG ?? '').trim();
          const inputVersion = (process.env.INPUT_VERSION ?? '').trim();
          const requestedVersion = (inputVersion || releaseTag).replace(/^v/, '');
          const semverPattern = /^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/;

          if (!owner) {
            throw new Error('Missing REPOSITORY_OWNER environment variable.');
          }

          if ((inputVersion || releaseTag) && !semverPattern.test(requestedVersion)) {
            throw new Error(
              `Release version must be valid semver (received: ${inputVersion || releaseTag}). ` +
              'Use tags such as v0.2.1 or pass a workflow_dispatch version like 0.2.1.',
            );
          }

          const baseName = String(pkg.name).replace(/^@[^/]+\//, '');

          pkg.name = `@${owner}/${baseName}`;
          pkg.private = false;
          pkg.publishConfig = {
            ...(pkg.publishConfig ?? {}),
            registry: 'https://npm.pkg.github.com',
          };

          if (requestedVersion) {
            pkg.version = requestedVersion;
          }

          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          EOF

      - name: Publish to GitHub Packages
        run: pnpm publish --no-git-checks --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
